    <style>
        /* Modern CSS Reset & Variables */
        :root {
            --text-main: #333;
            --text-muted: #6c757d;
            --bg-color: #f8f9fa;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Force footer to bottom */
        }

        /* Hero Section (Replaces Jumbotron) */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem); /* Fluid typography */
            font-weight: 300;
            margin-bottom: 1rem;
        }

        .lead {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 300;
            animation: fadeIn 2s ease-in;
        }

        footer {
            padding: 2rem 0;
            text-align: center;
            font-size: 0.9rem;
            color: gray;
        }

        footer a {
            color: gray;
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
