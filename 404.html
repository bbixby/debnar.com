    <style>
        :root {
            --text-main: #333;
            --text-muted: #6c757d;
            --bg-color: #f8f9fa;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 5rem;
            font-weight: 100;
            margin: 0;
            color: var(--text-muted);
        }

        h2 {
            font-size: 2rem;
            font-weight: 300;
            margin: 0.5rem 0 1.5rem;
        }

        .details {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        /* Modern CTA Button */
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 400;
            color: #fff;
            background-color: var(--text-main);
            text-decoration: none;
            border-radius: 4px;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        footer {
            padding: 2rem 0;
            font-size: 0.9rem;
            color: gray;
        }

        footer a {
            color: gray;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
